<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1420"/>
      <stop offset="100%" stop-color="#182238"/>
    </linearGradient>
    <radialGradient id="glow" cx="26%" cy="50%" r="42%">
      <stop offset="0%" stop-color="#4f8cff" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#4f8cff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Estrella del tracker (misma identidad que el favicon) -->
  <g transform="translate(310 315) rotate(-8)">
    <path d="M0 -110 L25.9 -35.6 L104.6 -34 L41.8 13.6 L64.7 89 L0 44 L-64.7 89 L-41.8 13.6 L-104.6 -34 L-25.9 -35.6 Z"
      fill="#4f8cff" stroke="#7aa8ff" stroke-width="3" stroke-linejoin="round"/>
  </g>

  <!-- Nombre y tagline -->
  <text x="470" y="300" font-family="Arial, 'DejaVu Sans', sans-serif" font-size="150" font-weight="700" fill="#f0eee6" letter-spacing="-2">Tracker</text>
  <text x="476" y="370" font-family="Arial, 'DejaVu Sans', sans-serif" font-size="35" font-weight="400" fill="#9aa7bd">Hábitos gamificados con tus amigos</text>

  <!-- Chips de features -->
  <g font-family="Arial, 'DejaVu Sans', sans-serif" font-size="30" font-weight="700" fill="#cdd6e6">
    <rect x="474" y="410" width="150" height="54" rx="14" fill="#4f8cff" fill-opacity="0.14" stroke="#4f8cff" stroke-opacity="0.5" stroke-width="2"/>
    <text x="549" y="446" text-anchor="middle">XP</text>
    <rect x="640" y="410" width="200" height="54" rx="14" fill="#4f8cff" fill-opacity="0.14" stroke="#4f8cff" stroke-opacity="0.5" stroke-width="2"/>
    <text x="740" y="446" text-anchor="middle">Rachas</text>
    <rect x="856" y="410" width="220" height="54" rx="14" fill="#4f8cff" fill-opacity="0.14" stroke="#4f8cff" stroke-opacity="0.5" stroke-width="2"/>
    <text x="966" y="446" text-anchor="middle">Aldea</text>
  </g>
</svg>
